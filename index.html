<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>BioTel Drug Flashcards</title>
<script>
  const v = Date.now();
  document.write('<link rel="stylesheet" href="styles.css?v=' + v + '">');
</script>
</head>
<body>
<header class="topbar">
  <div class="title">BioTel Flashcards</div>
  <div class="counter" id="counter">0 / 0</div>
</header>

<nav class="tabs">
  <button class="tab active" data-filter="all">All</button>
  <button class="tab" data-filter="drug">Drugs</button>
  <button class="tab" data-filter="general">General</button>
</nav>

<main class="stage">
  <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard, tap to flip">
    <div class="face front" id="front"></div>
    <div class="face back" id="back"></div>
  </div>
  <div class="hint" id="hint">Tap card to reveal</div>
</main>

<nav class="controls">
  <button class="btn" id="prev" aria-label="Previous">&larr;</button>
  <button class="btn flip" id="flip" aria-label="Flip">Flip</button>
  <button class="btn" id="next" aria-label="Next">&rarr;</button>
  <button class="btn icon" id="shuffle" aria-label="Shuffle">&#x1F500;</button>
</nav>

<script>
  const s = document.createElement('script');
  s.src = 'app.js?v=' + Date.now();
  document.body.appendChild(s);
</script>
</body>
</html>
